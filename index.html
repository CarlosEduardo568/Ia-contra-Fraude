<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>IA Contra Fraude</title>
</head>
<body>
    <header>
        <span id="span-ajuda-back-icon">
            <a href="ajuda.html"><img src="./assets/ajuda-icon.svg" alt=""></a>
        </span>
        <h1>Verifica News</h1>
    </Header>

    <main>
        <div class="div-apresentacao">
            <div id="icone-verificanews"></div>
            <h1>Verificador de Notícias</h1>
            <p>Identifique desinformação e fake news em segundos usando inteligência artificial avançada.</p>
        </div>

        <!-- Input colocar url da noticia e botão pesquisar -->
        <div class="div-verificar-noticia">

            <div class="div-label-url">
                <label>
                    <h4>URL da Notícia</h4>
                    <div class="div-input-url">
                        <input class="div-input-url-display" type="url" placeholder="https://exemplo.com/notícia-importante">
                    </div>
                </label>
            </div>

            <br>

            <button class="bnt-verificar-noticias">Analizar Notícia</button>
        </div>

        <br>

        <!-- Campo de espera e visualizar resultados -->
         <div>
            <h3>Resultado da análise</h3>

            <div class="div-resultado">
                <input id="input-resultado" type="text">
            </div>
            
         </div>

    </main>

    <footer>
    </footer>
    
</body>
</html>
