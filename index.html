<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>IA Contra Fraude</title>
</head>
<body>
    <header>
        <span id="span-ajuda-back-icon">
            <a href="ajuda.html"><img src="./assets/ajuda-icon.svg" alt=""></a>
        </span>
        <h1>Verifica News</h1>
    </Header>

    <main>
        <div class="div-apresentacao">
            <div id="icone-verificanews"></div>
            <h1>Verificador de Notícias</h1>
            <p>Identifique desinformação e fake news em segundos usando inteligência artificial avançada.</p>
        </div>

        <!-- Input colocar url da noticia e botão pesquisar -->
        <div class="div-verificar-noticia">

            <div class="div-label-url">
                <label>
                    <h4>URL da Notícia</h4>
                    <div class="div-input-url">
                        <input class="div-input-url-display" type="url" placeholder="https://exemplo.com/notícia-importante">
                    </div>
                </label>
            </div>

            <br>

            <button class="bnt-verificar-noticias">
                <img src="./assets/analytics-plus-line-svgrepo-com.svg" alt="">
                Analizar Notícia
            </button>
        </div>

        <br>

        <!-- Campo de espera e visualizar resultados -->
            <h3>Resultado da análise</h3>

            <div class="div-resultado">
                <input id="input-resultado" type="text">

                <div class="container-elementos-resultados">
                <div class="div-elementos-resultado">
                    <img src="./assets/verification-window-button-svgrepo-com.svg" alt="">
                    <h4>Aguardando Resultado...</h4>
                    <p>Insira um link acima para começar</p>
                </div>
                </div>   
            </div>

            <br>
            <!-- Fontes Consultadas --> 
             <div class="div-fontes-consultadas">

                <input type="checkbox" id="checkbox-fontes-consultadas">
                
                <label for="checkbox-fontes-consultadas">
                    <span class="icon-checkbox-fontes-consultadas"></span>
                    <h4>Fontes Consultadas</h4>
                </label>

             </div>

    </main>

    <footer>
    </footer>
    
</body>
</html>
